<!DOCTYPE html>
<html>
  <head>
   <style>
    #bg-video {
     position: fixed;
     top: 0;
     left: 0;
     width: 100%;
     height: 100%;
     object-fit: cover;
     z-index: -1;
    }
   </style>
  </head>

  <body>
   
    <video autoplay muted loop id="bg-video">
    <source src="anime-wallpaper-2 (1).mp4" type="video/mp4">
   </video>

    
    <div id="welcome-window" style="
      width: 264px;
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px;
      border: 8px solid;
      border-top-width: 16px;
      border-radius: 16px;
      border-color: #00FFFF;
      background-color: rgba(203, 226, 254, 0.5);
      backdrop-filter: blur(10px);
    ">

    <div id="welcome-windowheader"  style="
     width: 100%;
     height: 16px;
     position: absolute;
     top: -16px;
     left: 0;
     cursor: grab;
     margin: 0;
     padding: 0;
     z-index: 10;
  " >
    </div>

      <!-- Content Here -->
       <h1 style="
    font-family: Avantgarde, TeX Gyre Adventor, URW Gothic L, sans-serif;
       ">
    Welcome To <strong>KangOS</strong>
       </h1>

      <p>KangOS is an integrated web-based platform for seamless daily task management.</p>

       <img style="
     border-radius: 16px;
     object-fit: cover;"
     width="240px";
     height="135px";

     src="wmremove-transformed.png" alt="KangOS Logo"
       ">

    </div>

    <div style="
    position: absolute;
    bottom: 20px;
    display: flex;
    justify-content: space-around;
    align-items: flex-end;
    backdrop-filter: blur(13px);
    background-color: rgba(255, 255, 255, 0.25);
    color: azure;
    width: 60%;
    margin: 0 auto;
    left: 0;
    right: 0;
    border: 1px solid;
    border-color: rgba(255, 255, 255, 0.35);
    border-radius: 12px;
    z-index: 10000;
    ">

    <img style="
    border-radius: 12px;"
    width="24px"
    height="24px"
    src="taskbar-logo.png" alt="KangOS Taskbar Logo">

    <p style="
    margin-left: 12px;
    ">
      KangOS
    </p>

    <p id="timeElement"
     
    style="margin-right: 12px;">
    </p>

    </div>

      <script src="script.js" > </script>

  </body>

</html>
